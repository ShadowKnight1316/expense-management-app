📱 Expense Management Application – Requirements
1. 🎯 Objective
The goal of this application is to help users:

Track daily expenses 💸
Manage income vs spending
Get insights on spending habits
Stay within budget
2. 👤 Target Users
Individuals (personal finance)
Working professionals
Students
3. 🔑 Core Features
3.1 User Authentication
Sign Up (Email / Mobile)
Login / Logout
Forgot Password
3.2 Dashboard
Total balance
Total income
Total expenses
Recent transactions (last 5–10)
3.3 Add Expense
Amount
Category (Food, Travel, Bills, Shopping, etc.)
Date
Description (optional)
Payment mode (Cash, UPI, Card)
3.4 Add Income
Salary / Freelance / Other
Amount
Date
Notes
3.5 Categories Management
Default categories (Food, Rent, Transport)
User can:
Add category
Edit category
Delete category
3.6 Transaction History
List of all income & expenses
Filters:
Date range
Category
Type (Income/Expense)
Sort by date/amount
3.7 Budget Management
Set monthly budget
Alerts when:
80% budget reached
Budget exceeded
3.8 Reports & Analytics
Monthly summary
Category-wise expense breakdown
Charts:
Pie chart (category)
Bar chart (monthly trend)
3.9 Notifications
Budget alerts
Daily reminder to add expenses
4. ⚙️ Non-Functional Requirements
Performance
App should load within 2–3 seconds
Security
Password encryption
Secure APIs
Usability
Simple UI
Mobile-friendly
Scalability
Should handle multiple users
5. 🗄️ Database Design (Basic Tables)
Users
user_id
name
email
password
Transactions
transaction_id
user_id
type (income/expense)
amount
category_id
date
description
Categories
category_id
user_id
name
Budget
budget_id
user_id
month
amount
6. 🔄 Basic Flow
User registers
Logs in
Adds income
Adds expenses
Views dashboard
Checks reports




pense Management App – API Endpoints
🌐 Base URL
/api/v1
🔐 1. Authentication APIs
➤ Register User
POST /auth/register

Request Body:

{
  "name": "Pavan",
  "email": "pavan@gmail.com",
  "password": "123456"
}

Response:

{
  "message": "User registered successfully"
}
➤ Login
POST /auth/login

Request:

{
  "email": "pavan@gmail.com",
  "password": "123456"
}

Response:

{
  "token": "jwt-token",
  "userId": 1
}
➤ Forgot Password
POST /auth/forgot-password
👤 2. User APIs
➤ Get User Profile
GET /users/{userId}
➤ Update Profile
PUT /users/{userId}
💸 3. Expense APIs
➤ Add Expense
POST /expenses

Request:

{
  "amount": 500,
  "categoryId": 2,
  "date": "2026-04-13",
  "description": "Dinner",
  "paymentMode": "UPI"
}
➤ Get All Expenses
GET /expenses?userId=1
➤ Get Expense by ID
GET /expenses/{expenseId}
➤ Update Expense
PUT /expenses/{expenseId}
➤ Delete Expense
DELETE /expenses/{expenseId}
💰 4. Income APIs
➤ Add Income
POST /income

Request:

{
  "amount": 50000,
  "source": "Salary",
  "date": "2026-04-01",
  "description": "April Salary"
}
➤ Get All Income
GET /income?userId=1
➤ Update Income
PUT /income/{incomeId}
➤ Delete Income
DELETE /income/{incomeId}
🗂️ 5. Category APIs
➤ Create Category
POST /categories

Request:

{
  "name": "Food"
}
➤ Get All Categories
GET /categories?userId=1
➤ Update Category
PUT /categories/{categoryId}
➤ Delete Category
DELETE /categories/{categoryId}
📊 6. Dashboard APIs
➤ Get Dashboard Summary
GET /dashboard?userId=1

Response:

{
  "totalBalance": 20000,
  "totalIncome": 50000,
  "totalExpense": 30000,
  "recentTransactions": []
}
📈 7. Reports APIs
➤ Monthly Report
GET /reports/monthly?userId=1&month=04&year=2026
➤ Category-wise Report
GET /reports/category?userId=1
🎯 8. Budget APIs
➤ Set Budget
POST /budgets
{
  "amount": 20000,
  "month": "2026-04"
}
➤ Get Budget
GET /budgets?userId=1&month=2026-04
🔔 9. Notification APIs (Optional)
➤ Get Notifications
GET /notifications?userId=1