# ── Production profile (Railway) ──────────────────────────────────────────────
# JDBC_URL must be set manually in Railway Variables as:
# jdbc:postgresql://HOST:PORT/DBNAME?user=USER&password=PASS

spring.datasource.url=${JDBC_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 disabled
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# JWT
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration=86400000

# Port
server.port=${PORT:8080}
